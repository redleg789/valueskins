# Rust Backend K8s Deployment
# The actual backend that handles 100K users

apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: valueskins
data:
  RUST_BACKTRACE: "1"
  RUST_LOG: "info,api_gateway=debug"
  DATABASE_URL: "postgres://valueskins:password@pgbouncer:5432/valueskins"
  DATABASE_POOL_SIZE: "100"
  DATABASE_REPLICA_1_URL: "postgres://valueskins:password@read-replica-1:5432/valueskins"
  DATABASE_REPLICA_2_URL: "postgres://valueskins:password@read-replica-2:5432/valueskins"
  REDIS_URL: "redis://redis:6379"
  REDIS_POOL_SIZE: "100"
  JWT_SECRET: "" # Fill from secrets
  API_KEY_HMAC_SALT: "" # Fill from secrets
  WEBSOCKET_MAX_CONNECTIONS: "10000"
  WEBSOCKET_PING_INTERVAL_SECONDS: "30"
  SESSION_TTL_SECONDS: "3600"
  RATE_LIMIT_ENABLED: "true"
  READ_REPLICA_ENABLED: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: valueskins
  labels:
    app: backend
    tier: api
spec:
  replicas: 10
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: backend
        tier: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: backend
              topologyKey: topology.kubernetes.io/zone
      containers:
      - name: backend
        image: valueskins/backend:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
        - name: metrics
          containerPort: 9090
        - name: websocket
          containerPort: 8081
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: valueskins-secrets
        resources:
          requests:
            cpu: "1000m"
            memory: "1Gi"
          limits:
            cpu: "4000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
      - name: envoy-sidecar
        image: envoyproxy/envoy:v1.28-latest
        args:
        - -c
        - /config/envoy.yaml
        - --service-cluster
        - backend
        ports:
        - name: envoy
          containerPort: 8082
        volumeMounts:
        - name: envoy-config
          mountPath: /config
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: envoy-config
        configMap:
          name: envoy-config
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: valueskins
  labels:
    app: backend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
  - name: metrics
    port: 9090
    targetPort: metrics
  - name: websocket
    port: 8081
    targetPort: websocket
  selector:
    app: backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: valueskins
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 10
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
      - type: Percent
        value: 25
        periodSeconds: 30
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 10
        periodSeconds: 15
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: valueskins
spec:
  minAvailable: 5
  selector:
    matchLabels:
      app: backend