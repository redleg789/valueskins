apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: valueskins
  labels:
    app: pgbouncer
    tier: database
spec:
  replicas: 6
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
        tier: database
    spec:
      containers:
      - name: pgbouncer
        image: pgbouncer/pgbouncer:latest
        ports:
        - name: pgbouncer
          containerPort: 5432
        - name: admin
          containerPort: 6432
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: valueskins-secrets
              key: DATABASE_URL
        - name: POOL_MODE
          value: transaction
        - name: MAX_CLIENT_CONN
          value: "1000"
        - name: DEFAULT_POOL_SIZE
          value: "50"
        - name: MIN_POOL_SIZE
          value: "10"
        - name: RESERVE_POOL_SIZE
          value: "20"
        - name: MAX_DB_CONNECTIONS
          value: "200"
        - name: MAX_USER_CONNECTIONS
          value: "200"
        - name: IDLE_TIMEOUT
          value: "600"
        - name: KEEPALIVE
          value: "60"
        - name: SERVER_RESET_QUERY
          value: "DISCARD ALL"
        - name: SERVER_CHECK_DELAY
          value: "30"
        - name: LOG_CONNECTIONS
          value: "0"
        - name: LOG_DISCONNECTIONS
          value: "0"
        - name: LOG_POOLER_ERRORS
          value: "1"
        - name: LOG_STATS
          value: "0"
        - name: ADMIN_USERS
          value: "pgbouncer"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        livenessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -h
            - localhost
            - -U
            - pgbouncer
            - -p
            - "5432"
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: valueskins
  labels:
    app: pgbouncer
spec:
  type: ClusterIP
  ports:
  - name: pgbouncer
    port: 5432
    targetPort: 5432
  - name: admin
    port: 6432
    targetPort: 6432
  selector:
    app: pgbouncer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pgbouncer-hpa
  namespace: valueskins
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pgbouncer
  minReplicas: 6
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70