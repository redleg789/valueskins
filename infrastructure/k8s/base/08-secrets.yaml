# Kubernetes Secrets - Base64 encoded (use sealed secrets in production)
# DO NOT commit raw secrets - use SealedSecret or external secrets manager

apiVersion: v1
kind: Secret
metadata:
  name: valueskins-secrets
  namespace: valueskins
type: Opaque
stringData:
  # Database connection (PostgreSQL)
  # Format: postgres://user:password@host:port/database
  DATABASE_URL: ""
  
  # Redis connection
  REDIS_URL: "redis://redis:6379"
  
  # JWT configuration
  JWT_SECRET: ""
  
  # API key HMAC salt
  API_KEY_HMAC_SALT: ""
  
  # Verification HMAC secret
  VERIFICATION_HMAC_SECRET: ""
  
  # Platform signing key (Ed25519)
  PLATFORM_SIGNING_KEY_ED25519: ""
  
  # SMTP configuration
  SMTP_HOST: ""
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: ""
  
  # Stripe keys (if using payments)
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  
  # AWS credentials (if using AWS)
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
---
# TLS Secret (use cert-manager for auto-renewal)
apiVersion: v1
kind: Secret
metadata:
  name: valueskins-tls
  namespace: valueskins
type: kubernetes.io/tls
data:
  # Fill with cert-manager managed cert
  # tls.crt: LS0tLS1CRUdJTiBDRVJUSUZ...
  # tls.key: LS0tLS1CRUdJTiBFQyBQUklWQVRF...