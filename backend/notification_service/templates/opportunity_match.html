<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 32px;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 16px;
        }

        p {
            color: #a1a1aa;
            line-height: 1.6;
        }

        .highlight {
            color: #8b5cf6;
            font-weight: 600;
        }

        .amount {
            font-size: 48px;
            font-weight: 800;
            color: #22c55e;
            text-align: center;
            margin: 24px 0;
        }

        .cta {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .footer {
            text-align: center;
            color: #71717a;
            font-size: 14px;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">Valueskins</div>
        <div class="card">
            <h1>New opportunity matches your profile! 🎯</h1>
            <p><span class="highlight">{{brand}}</span> just posted an opportunity that matches your skills:</p>
            <h2 style="color: white; margin: 24px 0;">{{opportunity_title}}</h2>
            <div class="amount">${{reward}}</div>
            <p>This opportunity requires your verified skill level. Apply now before spots fill up!</p>
            <div style="text-align: center; margin-top: 24px;">
                <a href="https://valueskins.io/marketplace" class="cta">View Opportunity →</a>
            </div>
        </div>
        <div class="footer">© 2026 Valueskins</div>
    </div>
</body>

</html>
