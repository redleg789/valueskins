<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 32px;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
        }

        .amount {
            font-size: 48px;
            font-weight: 800;
            color: #22c55e;
            margin: 16px 0;
        }

        p {
            color: #a1a1aa;
            line-height: 1.6;
        }

        .highlight {
            color: #8b5cf6;
            font-weight: 600;
        }

        .footer {
            text-align: center;
            color: #71717a;
            font-size: 14px;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">Valueskins</div>
        <div class="card">
            <h1 style="font-size: 24px;">Referral Reward! 🎁</h1>
            <p>Your friend <span class="highlight">{{referred_name}}</span> just joined Valueskins!</p>
            <div class="amount">+${{amount}}</div>
            <p>This reward has been added to your pending balance. Keep sharing to earn more!</p>
        </div>
        <div class="footer">© 2026 Valueskins</div>
    </div>
</body>

</html>
