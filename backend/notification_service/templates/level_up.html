<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 32px;
        }

        .card {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(245, 158, 11, 0.1));
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
        }

        .level {
            font-size: 80px;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .level-name {
            font-size: 24px;
            font-weight: 600;
            color: #f59e0b;
        }

        p {
            color: #a1a1aa;
            line-height: 1.6;
        }

        .cta {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            margin-top: 16px;
        }

        .footer {
            text-align: center;
            color: #71717a;
            font-size: 14px;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">Valueskins</div>
        <div class="card">
            <h1 style="font-size: 28px;">🚀 You Leveled Up!</h1>
            <div class="level">L{{new_level}}</div>
            <div class="level-name">{{level_name}}</div>
            <p style="margin-top: 24px;">Your reputation is growing. New opportunities await!</p>
            <a href="https://valueskins.io/marketplace" class="cta">See New Opportunities →</a>
        </div>
        <div class="footer">© 2026 Valueskins</div>
    </div>
</body>

</html>
