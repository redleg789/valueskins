name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_load_tests:
        description: 'Run k6 load/abuse tests'
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Lint & Format ──────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Check formatting
        working-directory: backend
        run: cargo fmt --all -- --check
      - name: Clippy
        working-directory: backend
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Frontend lint
        working-directory: frontend
        run: |
          npm ci
          npx next lint
          node_modules/.bin/tsc --noEmit
      - name: Nexus lint
        working-directory: nexus/frontend
        run: |
          npm ci
          npm run lint || echo "Lint issues found"
          npx tsc --noEmit

  # ── Security Scanning (SAST + Dependencies) ───────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust audit
        working-directory: backend
        run: |
          cargo install cargo-audit
          cargo audit
      - name: Secret scanning
        run: |
          git clone https://github.com/awslabs/git-secrets.git /tmp/git-secrets || true
          cd /tmp/git-secrets && sudo make install || true
          git-secrets --scan || true
      - name: Dependency scan (Snyk)
        uses: snyk/actions/node@master
        continue-on-error: true
        with:
          args: --all-projects --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: SAST scan (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/rust
            p/typescript
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ── Backend Tests ──────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: valueskins_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/valueskins_test
      JWT_SECRET: test-secret-minimum-32-characters-long
      API_KEY_HMAC_SALT: test-salt-minimum-32-characters-long-here
      VERIFICATION_HMAC_SECRET: test-verification-secret-32-chars
      PLATFORM_SIGNING_KEY_ED25519: dGVzdC1lZDI1NTE5LXNpZ25pbmcta2V5LTMyLWNoYXJz
      LINKEDIN_CLIENT_ID: test-linkedin-client-id
      LINKEDIN_CLIENT_SECRET: test-linkedin-client-secret
      LINKEDIN_FEATURE_FLAG: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Run migrations
        working-directory: backend
        run: |
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx database setup
      - name: Run tests
        working-directory: backend
        run: cargo test --workspace --release

  # ── Frontend Tests ─────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: |
          npm ci
          npm run test --if-present -- --passWithNoTests
          npm run build

  

  load-tests:
    name: Load & Abuse Tests (k6)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_load_tests == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: valueskins_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/valueskins_test
      JWT_SECRET: test-secret-minimum-32-characters-long
      API_KEY_HMAC_SALT: test-salt-minimum-32-characters-long-here
      VERIFICATION_HMAC_SECRET: test-verification-secret-32-chars
      PLATFORM_SIGNING_KEY_ED25519: "test-test-test-test-test-test-test-test"
      ALLOWED_ORIGINS: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Install k6
        run: |
          sudo gpg -k
          sudo apt-get update
          sudo apt-get install -y gnupg ca-certificates
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
      - name: Run migrations
        working-directory: backend
        run: |
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx database setup
      - name: Build API gateway
        working-directory: backend
        run: cargo build -p api_gateway --release
      - name: Start API gateway
        run: |
          backend/target/release/api_gateway > /tmp/api_gateway.log 2>&1 &
          echo $! > /tmp/api_gateway.pid
          sleep 8
      - name: Run k6 suites
        run: |
          k6 run backend/load-tests/smoke.js --vus 10 --duration 30s || true
          k6 run backend/load-tests/load.js --vus 100 --duration 60s || true
      - name: Dump logs on failure
        if: failure()
        run: |
          cat /tmp/api_gateway.log || true
      - name: Stop API gateway
        if: always()
        run: |
          kill "$(cat /tmp/api_gateway.pid)" || true

  # ── Contract Tests ─────────────────────────────────────────────────
  test-contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - working-directory: contracts
        run: forge test -vvv

  # ── Build & Push Images ────────────────────────────────────────────
  build-images:
    name: Build ${{ matrix.service }}
    needs: [lint, security, test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, frontend]
        include:
          - service: api
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

  # ── Deploy to Production ────────────────────────────────────────────
  deploy:
    name: Deploy ValueSkins
    needs: [build-images]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run database migrations
        run: |
          cargo install sqlx-cli --no-default-features --features postgres
          sqlx database setup
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
