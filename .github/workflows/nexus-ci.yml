name: Nexus CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'nexus/**'
  pull_request:
    branches: [main]
    paths:
      - 'nexus/**'
  workflow_dispatch:

concurrency:
  group: nexus-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nexus/frontend/package-lock.json

      - name: Install dependencies
        working-directory: nexus/frontend
        run: npm ci

      - name: Lint
        working-directory: nexus/frontend
        run: npm run lint

      - name: TypeScript check
        working-directory: nexus/frontend
        run: npx tsc --noEmit

  # ── Build ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nexus/frontend/package-lock.json

      - name: Install dependencies
        working-directory: nexus/frontend
        run: npm ci

      - name: Build
        working-directory: nexus/frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-build
          path: nexus/frontend/.next
          retention-days: 7

  # ── Security Scan ──────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nexus/frontend/package-lock.json

      - name: Install dependencies
        working-directory: nexus/frontend
        run: npm ci

      - name: Audit dependencies
        working-directory: nexus/frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  # ── Build Docker Image ──────────────────────────────────────────────
  docker:
    name: Build Docker Image
    needs: [lint, build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./nexus/frontend
          file: ./nexus/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/nexus:${{ github.sha }}
            ghcr.io/${{ github.repository }}/nexus:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true