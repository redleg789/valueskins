name: Nexus Deploy

on:
  workflow_run:
    workflows: [Nexus CI]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Deploy to Vercel ───────────────────────────────────────────────
  deploy-vercel:
    name: Deploy to Vercel
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: nexus/frontend

      - name: Verify deployment
        run: |
          echo "Nexus deployed successfully"
          echo "Check Vercel dashboard for live URL"

  # ── Deploy to Kubernetes (optional) ─────────────────────────────────
  deploy-k8s:
    name: Deploy to Kubernetes
    needs: deploy-vercel
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.K8S_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name nexus-prod --region us-east-1

      - name: Deploy Nexus
        run: |
          SHA=${{ github.event.workflow_run.head_sha }}
          kubectl set image deployment/nexus \
            nexus=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nexus:${SHA} \
            -n nexus
          kubectl rollout status deployment/nexus -n nexus --timeout=300s

      - name: Smoke test
        run: |
          NEXUS_URL=$(kubectl get svc nexus -n nexus -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${NEXUS_URL}/")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Nexus smoke test passed"
          else
            echo "Nexus smoke test failed with code: ${HTTP_CODE}"
            exit 1
          fi