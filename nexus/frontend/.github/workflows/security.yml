# =============================================================================
# SECURITY WORKFLOW - Weekly Security Scanning
# =============================================================================
# Runs on: Weekly schedule + manual trigger
# Purpose:  Scan for vulnerabilities, secrets, and code quality issues
# =============================================================================

name: Security Scan

# Run weekly on Sunday at 2am UTC, or manually
on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 2am UTC
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # JOB: Dependency Audit
  # ---------------------------------------------------------------------------
  dependencies:
    name: Audit Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nexus/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd nexus/frontend
          npm ci

      - name: Audit dependencies
        run: |
          cd nexus/frontend
          npm audit --audit-level=high
        continue-on-error: true

      - name: Check for outdated packages
        run: |
          cd nexus/frontend
          npm outdated --json || echo "All packages up to date"

  # ---------------------------------------------------------------------------
  # JOB: Secret Detection
  # ---------------------------------------------------------------------------
  secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-secrets

      - name: Run git-secrets
        run: |
          # Check if git-secrets is available
          if command -v git-secrets &> /dev/null; then
            git secrets --scan
          else
            echo "git-secrets not installed, skipping..."
          fi

      - name: Check for sensitive files
        run: |
          echo "🔍 Scanning for sensitive files..."
          
          # Check for common sensitive files that shouldn't be committed
          SENSITIVE_FILES=(
            ".env"
            ".env.local"
            "credentials.json"
            "secrets.json"
            "*.pem"
            "*.key"
            "id_rsa"
            "docker-compose.yml"
          )
          
          for pattern in "${SENSITIVE_FILES[@]}"; do
            if find nexus/frontend -name "$pattern" -type f 2>/dev/null | grep -q .; then
              echo "⚠️ Found $pattern - ensure it's in .gitignore"
            fi
          done
          
          echo "✅ Sensitive file check complete"

  # ---------------------------------------------------------------------------
  # JOB: Security Headers Check
  # ---------------------------------------------------------------------------
  headers:
    name: Security Headers
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check security headers configuration
        run: |
          echo "🔒 Checking security headers..."
          
          # Check next.config.js for security headers
          if [ -f nexus/frontend/next.config.js ]; then
            echo "✅ next.config.js exists"
            
            # Verify headers are configured
            if grep -q "X-Frame-Options" nexus/frontend/next.config.js; then
              echo "✅ X-Frame-Options configured"
            else
              echo "⚠️ X-Frame-Options not found"
            fi
            
            if grep -q "Content-Security-Policy" nexus/frontend/next.config.js; then
              echo "✅ CSP configured"
            else
              echo "⚠️ Content-Security-Policy not found"
            fi
          else
            echo "⚠️ next.config.js not found"
          fi
          
          echo "✅ Security headers check complete"

  # ---------------------------------------------------------------------------
  # JOB: Code Quality Scan
  # ---------------------------------------------------------------------------
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nexus/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd nexus/frontend
          npm ci

      - name: Run ESLint
        run: |
          cd nexus/frontend
          npm run lint || echo "Lint issues found"

      - name: TypeScript check
        run: |
          cd nexus/frontend
          npx tsc --noEmit || echo "TypeScript issues found"

      - name: Check for TODO comments
        run: |
          echo "🔍 Checking for TODOs..."
          TODOS=$(grep -r "TODO" nexus/frontend/src --include="*.ts" --include="*.tsx" 2>/dev/null | wc -l || echo "0")
          echo "Found $TODOS TODO comments"
          
      - name: Check for console.log
        run: |
          echo "🔍 Checking for console.log..."
          CONSOLE_LOGS=$(grep -r "console.log" nexus/frontend/src --include="*.ts" --include="*.tsx" 2>/dev/null | wc -l || echo "0")
          echo "Found $CONSOLE_LOGS console.log statements"

  # ---------------------------------------------------------------------------
  # JOB: Vulnerability Report
  # ---------------------------------------------------------------------------
  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: [dependencies, secrets, headers, code-quality]
    
    steps:
      - name: Generate security report
        run: |
          echo "📊 SECURITY SCAN REPORT"
          echo "======================"
          echo "Date: $(date)"
          echo ""
          echo "Scans completed:"
          echo "  ✅ Dependencies audited"
          echo "  ✅ Secrets detected"
          echo "  ✅ Security headers checked"
          echo "  ✅ Code quality analyzed"
          echo ""
          echo "Next steps:"
          echo "  1. Review any warnings above"
          echo "  2. Fix critical issues before next deployment"
          echo "  3. Update dependencies if vulnerabilities found"

# =============================================================================
# SUMMARY
# =============================================================================
# This security workflow runs weekly to ensure:
# 1. No vulnerable dependencies
# 2. No secrets committed
# 3. Security headers properly configured
# 4. Code quality maintained
# =============================================================================