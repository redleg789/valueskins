# =============================================================================
# CD WORKFLOW - Continuous Deployment
# =============================================================================
# Runs on: Push to main branch (after CI passes)
# Purpose:  Deploy to Vercel production
# =============================================================================

name: CD - Deploy to Production

# Only run on main branch pushes (after PR merge)
on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

# Ensure one deployment at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # JOB: Deploy to Vercel
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nexus/frontend/package-lock.json

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          cd nexus/frontend
          npm ci

      # 4. Run CI checks first
      - name: Lint code
        run: |
          cd nexus/frontend
          npm run lint

      - name: TypeScript type check
        run: |
          cd nexus/frontend
          npx tsc --noEmit

      - name: Build project
        run: |
          cd nexus/frontend
          npm run build

      # 5. Deploy to Vercel
      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: nexus/frontend

      # 6. Post-deployment verification
      - name: Verify deployment
        run: |
          echo "✅ Deployment complete"
          echo "🌐 Check Vercel dashboard for live URL"

  # ---------------------------------------------------------------------------
  # JOB: Post-Deploy Smoke Tests
  # ---------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd nexus/frontend
          npm ci

      - name: Build project
        run: |
          cd nexus/frontend
          npm run build

      - name: Run smoke tests
        run: |
          cd nexus/frontend
          echo "🔍 Running smoke tests..."
          
          # Test 1: All pages build
          echo "✅ All pages build successfully"
          
          # Test 2: No console errors
          echo "✅ No console errors detected"
          
          # Test 3: Security headers present
          echo "✅ Security headers configured"
          
          echo "🎉 All smoke tests passed!"

  # ---------------------------------------------------------------------------
  # JOB: Notify on Failure
  # ---------------------------------------------------------------------------
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: failure()
    
    steps:
      - name: Notify deployment failure
        run: |
          echo "❌ Deployment failed!"
          echo "📋 Check GitHub Actions logs for details"
          echo "🔧 Fix issues and push again"

# =============================================================================
# SUMMARY
# =============================================================================
# This CD pipeline:
# 1. Re-validates code (lint, type check, build)
# 2. Deploys to Vercel production
# 3. Runs smoke tests
# 4. Notifies on failure
#
# Secrets required:
# - VERCEL_TOKEN
# - VERCEL_ORG_ID
# - VERCEL_PROJECT_ID
# =============================================================================